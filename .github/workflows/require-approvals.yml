name: Require Approvals

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

jobs:
  require-approvals:
    if: github.event.pull_request.base.ref == 'staging'
      || startsWith(github.event.pull_request.base.ref, 'release/')
      || github.event.pull_request.base.ref == 'master'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      statuses: write
    steps:
      - name: Check that PR has at least 1 approval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const author = pr.user.login;

            // Get current reviewers
            const reviewers = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            }).then(response =>
              (response.data.requested_reviewers || []).map(reviewer => reviewer.login)
            );

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            // Track only the latest review state per user
            const latestReviewByUser = new Map();
            for (const review of reviews) {
              // Store the whole review object to access commit_id later
              latestReviewByUser.set(review.user.login, review);
            }

            // Count users whose latest review is APPROVED and who are not the PR author
            const approvers = [];
            const staleApprovers = [];
            const currentHeadSha = pr.head.sha;
            const REQUIRED_APPROVALS = 1;

            for (const [user, review] of latestReviewByUser.entries()) {
              if (review.state !== 'APPROVED' || user === author) {
                continue;
              }

              // Reset approvals if PR is edited or commit changed
              const isEdited = context.eventName === 'pull_request' && context.payload.action === 'edited';
              const isStale = review.commit_id !== currentHeadSha;

              if (isEdited || isStale) {
                staleApprovers.push(user);
              } else {
                approvers.push(user);
              }
            }

            // Re-request reviews from stale approvers
            if (staleApprovers.length > 0) {
                core.info(`Re-requesting reviews from stale approvers: ${staleApprovers.join(', ')}`);
                await github.rest.pulls.requestReviewers({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    reviewers: staleApprovers
                });
            }

            if (context.eventName === 'pull_request_review') {
                try {
                    const { data: runs } = await github.rest.actions.listWorkflowRuns({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: 'require-approvals.yml',
                        event: 'pull_request',
                        branch: pr.head.ref,
                        per_page: 1,
                    });

                    if (runs.workflow_runs.length > 0) {
                        const latestRun = runs.workflow_runs[0];
                        if (latestRun.head_sha === currentHeadSha && latestRun.conclusion === 'failure') {
                            core.info(`Re-running failed 'pull_request' workflow run ${latestRun.id}`);
                            await github.rest.actions.reRunWorkflow({
                                owner: context.repo.owner,
                                repo: context.repo.repo,
                                run_id: latestRun.id,
                            });
                        }
                    }
                } catch (error) {
                    core.warning(`Failed to re-run workflow: ${error.message}`);
                }
            }

            core.info(`Unique non-author approvals: ${approvers.length} (${approvers.join(', ')})`);

            if (approvers.length < REQUIRED_APPROVALS) {
              core.setFailed(
                `Requires at least ${REQUIRED_APPROVALS} approval (currently ${approvers.length}).`
              );
            }
